<section
	class="section section-base"
	[id]="sectionId"
	[ngClass]="sectionClass"
	appScrollActive
>
	<div
		class="content"
		[style.max-width]="maxWidth"
	>
		<div
			class="header"
			appScrollReveal
			[revealDelayMin]="80"
			[revealDelayMax]="360"
			[revealOnce]="false"
		>
			@if (sectionNumber) {
			<h3 class="section-number">{{ sectionNumber }}</h3>
			}
			@if (sectionLabel) {
			<h2 class="section-label">{{ sectionLabel }}</h2>
			}
		</div>

		<div class="body">
			@if (title) {
			<h1
				class="title"
				appScrollReveal
				[revealDelayMin]="100"
				[revealDelayMax]="420"
				[revealOnce]="false"
			>
				{{ title }}
			</h1>
			}
			@for (p of subtitleParagraphs; track $index) {
			<p
				class="subtitle body-text"
				appScrollReveal
				[revealDelayMin]="120"
				[revealDelayMax]="460"
				[revealOnce]="false"
			>
				{{ p }}
			</p>
			}
			@if (subtitleHtml) {
			<p
				class="subtitle body-text"
				appScrollReveal
				[revealDelayMin]="120"
				[revealDelayMax]="460"
				[revealOnce]="false"
				[innerHTML]="subtitleHtml"
			></p>
			}
			<div class="content-slot">
				<ng-content></ng-content>
			</div>
		</div>
	</div>
</section>
