<app-section sectionId="convite" sectionNumber="01" sectionLabel="O CONVITE" sectionClass="convite">
	<div class="invitation-text">
		<h1 class="couple-names" appScrollReveal [revealDelayMin]="100" [revealDelayMax]="420" [revealOnce]="false">
			{{ groomName }} <span class="ampersand">&</span> {{ brideName }}
		</h1>

		<p class="message" appScrollReveal [revealDelayMin]="120" [revealDelayMax]="460" [revealOnce]="false">
			{{ message }}
		</p>

		<div class="details">
			<div class="detail-item" appScrollReveal [revealDelayMin]="140" [revealDelayMax]="500" [revealOnce]="false">
				<span class="detail-label">Data</span>
				<span class="detail-value">{{ weddingDate }}</span>
			</div>

			<div class="detail-item" appScrollReveal [revealDelayMin]="160" [revealDelayMax]="540" [revealOnce]="false">
				<span class="detail-label">Horário</span>
				<span class="detail-value">{{ weddingTime }}</span>
			</div>

			<div class="detail-item" appScrollReveal [revealDelayMin]="180" [revealDelayMax]="580" [revealOnce]="false">
				<span class="detail-label">Local</span>
				<span class="detail-value">{{ venue }}</span>
				<span class="detail-address">{{ address }}</span>
				<span class="detail-address">{{ city }}</span>
			</div>
		</div>

		<article class="rsvp-card" appScrollReveal [revealDelayMin]="200" [revealDelayMax]="620" [revealOnce]="false">
			<div class="card-shell" appScrollReveal [revealDelayMin]="220" [revealDelayMax]="640" [revealOnce]="false">
				<h2 class="rsvp-name" appScrollReveal [revealDelayMin]="240" [revealDelayMax]="660" [revealOnce]="false">Confirmação de presença</h2>
				<p class="rsvp-text" appScrollReveal [revealDelayMin]="260" [revealDelayMax]="680" [revealOnce]="false">Sua confirmação nos ajuda a preparar tudo com carinho.</p>

				<div class="links" appScrollReveal [revealDelayMin]="280" [revealDelayMax]="700" [revealOnce]="false">
					<a class="action action--ghost" [href]="whatsappDeclineUrl" target="_blank" rel="noopener noreferrer">
						<span class="material-symbols-rounded">close</span>
						INFELIZMENTE NÃO
					</a>
					<a class="action action--primary" [href]="whatsappConfirmUrl" target="_blank" rel="noopener noreferrer">
						<span class="material-symbols-rounded">check_circle</span>
						SIM, ESTAREI LÁ
					</a>
				</div>
			</div>
		</article>
	</div>
</app-section>
