<app-section
	sectionId="flash-tattoo"
	sectionNumber="02"
	sectionLabel="FLASH TATTOO"
	sectionClass="flash-tattoo"
	[title]="'Tatuagem Flash'"
	[subtitle]="description"
>
	<div class="tattoo-content">
		<a
			class="action action--primary"
			appScrollReveal
			[revealDelayMin]="160"
			[revealDelayMax]="540"
			[revealOnce]="false"
			[href]="whatsappUrl"
			target="_blank"
			rel="noopener noreferrer"
		>
			<span class="material-symbols-rounded">mode_comment</span> Falar com a tatuadora
		</a>

		<div
			class="pinterest-card"
			appScrollReveal
			[revealDelayMin]="180"
			[revealDelayMax]="580"
			[revealOnce]="false"
		>
			<span class="text-label">Inspirações</span>
			<div
				class="pinterest-embed"
				id="pinterest-embed"
			>
				<a
					title="Pinterest Board - Flash Tattoo Inspirations"
					data-pin-do="embedBoard"
					data-pin-board-width="880"
					data-pin-scale-height="200"
					data-pin-scale-width="80"
					[href]="pinterestBoardUrl"
				></a>
			</div>
		</div>

		<div
			class="info-box"
			appScrollReveal
			[revealDelayMin]="240"
			[revealDelayMax]="680"
			[revealOnce]="false"
		>
			<p>As tatuagens serão realizadas por um profissional experiente em um ambiente seguro e higienizado.</p>
		</div>
	</div>
</app-section>
