<app-section
	sectionId="presente"
	sectionNumber="04"
	sectionLabel="O PRESENTE"
	sectionClass="presente"
	title="Sem listas, sem stress"
	maxWidth="800px"
	[subtitle]="introTexts"
>

	<div class="presente-content">

		<div
			class="pix-box"
			appScrollReveal
			[revealDelayMin]="160"
			[revealDelayMax]="540"
			[revealOnce]="false"
		>
		<span class="text-label pix-label">Chave pix</span>
			<div class="pix-key-row">
				<code
					class="pix-key"
					#pixKeyEl
				>@for (char of pixChars; track $index) {<span class="pix-char">{{ char }}</span>}</code>
				<button
					class="copy-btn"
					(click)="copyPix()"
					aria-label="Copiar chave Pix"
				>
					<span class="material-symbols-rounded">content_copy</span>
				</button>
			</div>
		</div>

		<p
			class="note body-text"
			appScrollReveal
			[revealDelayMin]="180"
			[revealDelayMax]="580"
			[revealOnce]="false"
		>
			Mas, de verdade, o que mais importa é ter você lá com a gente. <span
				class="material-symbols-rounded">favorite</span>
		</p>
	</div>
</app-section>
